<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AIRpods — The Fully Connected Network</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --ink:#0e0e12;--ink2:#3a3a4a;--muted:#7a7a8c;
  --surface:#f5f4f0;--paper:#faf9f6;--accent:#4a3aff;
  --gold:#f0a500;--border:rgba(14,14,18,.1);--bmd:rgba(14,14,18,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:#fff;color:var(--ink);}

.wrap{max-width:1200px;margin:0 auto;padding:56px 48px 64px;}

.page-title{
  font-family:'DM Serif Display',serif;
  font-size:clamp(30px,4vw,52px);
  line-height:1.05;
  color:var(--ink);
  margin-bottom:40px;
  text-align:center;
}
.page-title em{font-style:italic;color:var(--accent);}

.canvas-area{position:relative;margin-bottom:20px;}
canvas{display:block;width:100%;border-radius:12px;}

.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.legend{display:flex;gap:20px;flex-wrap:wrap;padding:9px 16px;background:var(--surface);border-radius:8px;border:1px solid var(--border);}
.leg-item{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.leg-line{width:26px;height:1px;}
.leg-line.solid{background:rgba(14,14,18,.35);}
.leg-line.dash{border-top:1.5px dashed var(--muted);}
.btn-exp{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;padding:9px 18px;background:var(--gold);border:none;border-radius:6px;cursor:pointer;color:var(--ink);font-weight:600;margin-left:auto;transition:background .2s;}
.btn-exp:hover{background:#ffc107;}

/* Tooltip */
.tt{position:absolute;background:#fff;border:1px solid var(--bmd);border-top-width:3px;border-radius:14px;padding:0;pointer-events:none;opacity:0;transition:opacity .15s;width:300px;box-shadow:0 12px 40px rgba(14,14,18,.15);z-index:10;overflow:hidden;}
.tt.on{opacity:1;}
.tt-head{padding:14px 18px 10px;border-bottom:1px solid var(--border);}
.tt-num{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);margin-bottom:3px;}
.tt-name{font-family:'DM Serif Display',serif;font-size:17px;line-height:1.2;}
.tt-body{padding:0 18px 14px;}
.tt-row{padding-top:8px;}
.tt-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.tt-val{font-size:12.5px;line-height:1.55;color:var(--ink2);}
.tt-sep{height:1px;background:var(--border);margin:10px 0 0;}
.tt-dlbl{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.12em;text-transform:uppercase;}
.tt-dval{font-size:12.5px;line-height:1.5;font-weight:600;}

footer{text-align:center;padding:32px 0;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);border-top:1px solid var(--border);margin:0 48px;}
</style>
</head>
<body>
<div class="wrap">

  <h1 class="page-title">AI Readiness Pods <em>(AIRpods)</em></h1>

  <div class="canvas-area" id="ca">
    <div class="tt" id="tt">
      <div class="tt-head">
        <div class="tt-num" id="tt-num"></div>
        <div class="tt-name" id="tt-name"></div>
      </div>
      <div class="tt-body">
        <div class="tt-row">
          <div class="tt-lbl">Expertise</div>
          <div class="tt-val" id="tt-exp"></div>
        </div>
        <div class="tt-row">
          <div class="tt-lbl">Interfaces</div>
          <div class="tt-val" id="tt-iface"></div>
        </div>
        <div class="tt-row">
          <div class="tt-lbl">Network role</div>
          <div class="tt-val" id="tt-net"></div>
        </div>
        <div class="tt-sep"></div>
        <div class="tt-row">
          <div class="tt-dlbl" id="tt-dlbl">Deliverable</div>
          <div class="tt-dval" id="tt-dval"></div>
        </div>
      </div>
    </div>
    <canvas id="nc"></canvas>
    <canvas id="ec" style="position:absolute;left:-9999px;top:-9999px;"></canvas>
  </div>

  <div class="controls">
    <div class="legend">
      <div class="leg-item"><div class="leg-line solid"></div>Pod interfaces</div>
      <div class="leg-item"><div class="leg-line dash"></div>Deliverables outward</div>
    </div>
    <button class="btn-exp" onclick="exportNet()">&#8595; Export image</button>
  </div>

</div>
<footer>AIRpods &mdash; AI Readiness Pods &nbsp;&middot;&nbsp; Fully Connected Ecosystem</footer>

<script>
var PODS = [
  {
    name: 'Administration', number: 'Pod 1', color: '#534AB7', light: '#EEEDFE',
    ds: ['Policy &', 'Governance'],
    expertise:    'Strategic governance, resource allocation and ecosystem coordination.',
    interfaces:   'Issues directives to and receives performance data from all six pods.',
    network:      'Central coordination node — decisions ripple across every connected pod.',
    deliverable:  'Policy briefs, governance frameworks, and strategic roadmaps for stakeholders.'
  },
  {
    name: 'Education', number: 'Pod 2', color: '#0F6E56', light: '#E1F5EE',
    ds: ['Curricula &', 'Programs'],
    expertise:    'Curriculum design, learning outcomes and AI literacy program development.',
    interfaces:   'Sends learning frameworks to Workforce Dev; receives skill-gap data from Industry.',
    network:      'Anchors the academic backbone — content that Training and Workforce pods operationalize.',
    deliverable:  'Curricula, course materials, and AI literacy programs for students and the public.'
  },
  {
    name: 'Workforce Development', number: 'Pod 3', color: '#993556', light: '#FBEAF0',
    ds: ['Job', 'Pathways'],
    expertise:    'Career pathways, reskilling pipelines and workforce transition strategies.',
    interfaces:   'Receives curricula from Education; sends talent pipelines to Industry and Government.',
    network:      'Bridges academic preparation and employment, connecting Education to Industry.',
    deliverable:  'Job pathway maps, reskilling cohorts, and employment placement reports.'
  },
  {
    name: "Industry & Gov't Collab", number: 'Pod 4', color: '#993C1D', light: '#FAECE7',
    ds: ['Partnerships'],
    expertise:    'Public-private partnerships, policy alignment and AI adoption across sectors.',
    interfaces:   'Provides demand signals to Education and Workforce pods; channels funding.',
    network:      'External-facing hub that translates ecosystem outputs into sector-wide impact.',
    deliverable:  'Partnership agreements, policy recommendations, and sector adoption playbooks.'
  },
  {
    name: 'Planning & Development', number: 'Pod 5', color: '#185FA5', light: '#E6F1FB',
    ds: ['Dev.', 'Plans'],
    expertise:    'Strategic planning, infrastructure development and long-range AI readiness roadmapping.',
    interfaces:   'Feeds development plans to Administration; receives progress metrics from all pods.',
    network:      'The architectural layer — every pod builds on frameworks this pod produces.',
    deliverable:  'Development plans, infrastructure proposals, and readiness assessments.'
  },
  {
    name: 'Training / Capacity Bldg', number: 'Pod 6', color: '#3B6D11', light: '#EAF3DE',
    ds: ['Trained', 'Workforce'],
    expertise:    'Hands-on training delivery, instructor development and organizational capacity building.',
    interfaces:   'Receives content from Education; delivers trained cohorts to Workforce Development.',
    network:      'The execution engine that transforms educational content into applied human capacity.',
    deliverable:  'Trained workforce cohorts, certified instructors, and AI readiness reports.'
  },
  {
    name: 'Engaged Scholarship', number: 'Pod 7', color: '#854F0B', light: '#FAEEDA',
    ds: ['Research &', 'Evidence'],
    expertise:    'Applied research, community engagement and knowledge translation for AI equity.',
    interfaces:   'Supplies evidence base to Planning and Policy pods; engages communities for feedback.',
    network:      'The research and reflection layer that grounds every pod in evidence and community voice.',
    deliverable:  'Research publications, community impact reports, and equity-focused AI frameworks.'
  }
];

function rrect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);
  c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);
  c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);
  c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);
  c.arcTo(x,y,x+r,y,r);c.closePath();
}

var ca = document.getElementById('ca');
var nc = document.getElementById('nc');
var ctx = nc.getContext('2d');
var W, H, CX, CY, R, pos = [], hov = -1;

function resize() {
  var dpr = devicePixelRatio || 1;
  W = ca.clientWidth; H = Math.round(W * 0.90);
  nc.width = W * dpr; nc.height = H * dpr;
  nc.style.width = W + 'px'; nc.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  CX = W / 2; CY = H * 0.52; R = Math.min(W, H) * 0.28;
  calcPos(); draw(ctx, W, H, CX, CY, R, pos, false);
}

function calcPos() {
  pos = PODS.map(function(_, i) {
    var a = (i / 7) * Math.PI * 2 - Math.PI / 2;
    return { x: CX + R * Math.cos(a), y: CY + R * Math.sin(a), ba: a };
  });
}

function draw(c, w, h, cx, cy, r, pts, stat) {
  c.clearRect(0, 0, w, h);

  // dot grid
  c.save(); c.fillStyle = 'rgba(14,14,18,.04)';
  for (var gx = 0; gx < w; gx += 32)
    for (var gy = 0; gy < h; gy += 32) {
      c.beginPath(); c.arc(gx, gy, .9, 0, Math.PI * 2); c.fill();
    }
  c.restore();

  var rp = r * 0.22;

  // edges
  for (var i = 0; i < 7; i++) for (var j = i + 1; j < 7; j++) {
    var a = pts[i], b = pts[j];
    var hh = !stat && (hov === i || hov === j);
    c.save(); c.beginPath(); c.moveTo(a.x, a.y); c.lineTo(b.x, b.y);
    c.strokeStyle = hh ? 'rgba(14,14,18,.28)' : 'rgba(14,14,18,.12)';
    c.lineWidth = hh ? 1.4 : .75; c.stroke(); c.restore();
  }

  // deliverable shafts + labels
  pts.forEach(function(p, i) {
    var pod = PODS[i], a = p.ba;
    var x1 = p.x + Math.cos(a) * (rp + 3),  y1 = p.y + Math.sin(a) * (rp + 3);
    var x2 = p.x + Math.cos(a) * (rp + 66), y2 = p.y + Math.sin(a) * (rp + 66);
    var x2s= p.x + Math.cos(a) * (rp + 48), y2s= p.y + Math.sin(a) * (rp + 48);

    // white knockout under shaft
    c.save();
    for (var s = 0; s < 10; s++) {
      var t0 = s / 10, t1 = (s + 0.58) / 10;
      c.beginPath();
      c.moveTo(x1 + (x2s - x1) * t0, y1 + (y2s - y1) * t0);
      c.lineTo(x1 + (x2s - x1) * t1, y1 + (y2s - y1) * t1);
      c.strokeStyle = 'rgba(255,255,255,1)'; c.lineWidth = 8; c.stroke();
    }
    c.setLineDash([5, 4]);
    for (var s = 0; s < 10; s++) {
      var t0 = s / 10, t1 = (s + 0.42) / 10;
      c.beginPath();
      c.moveTo(x1 + (x2 - x1) * t0, y1 + (y2 - y1) * t0);
      c.lineTo(x1 + (x2 - x1) * t1, y1 + (y2 - y1) * t1);
      c.strokeStyle = pod.color + 'bb'; c.lineWidth = 1.6; c.stroke();
    }
    c.setLineDash([]); c.restore();

    // label
    var lx = p.x + Math.cos(a) * (rp + 92), ly = p.y + Math.sin(a) * (rp + 92);
    var lines = pod.ds, lh = 28, bpad = 9, lw = 100;
    c.save();
    rrect(c, lx - lw / 2 - bpad, ly - lines.length * lh / 2 - bpad,
          lw + bpad * 2, lines.length * lh + bpad * 2, 6);
    c.fillStyle = 'rgba(255,255,255,.92)'; c.fill();
    c.font = '600 14px Outfit,sans-serif';
    c.fillStyle = pod.color + 'cc';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    lines.forEach(function(ln, li, arr) {
      c.fillText(ln, lx, ly + (li - (arr.length - 1) / 2) * lh);
    });
    c.restore();
  });

  // pod circles
  pts.forEach(function(p, i) {
    var pod = PODS[i], hh = !stat && hov === i, r2 = hh ? rp * 1.05 : rp;
    if (hh) {
      c.save(); c.beginPath(); c.arc(p.x, p.y, r2 + 16, 0, Math.PI * 2);
      c.fillStyle = pod.color + '18'; c.fill(); c.restore();
    }
    c.save(); c.beginPath(); c.arc(p.x, p.y, r2, 0, Math.PI * 2);
    c.fillStyle = pod.light; c.fill();
    c.strokeStyle = pod.color; c.lineWidth = hh ? 2.8 : 2; c.stroke(); c.restore();

    [0, Math.PI / 2, Math.PI, Math.PI * 3 / 2].forEach(function(da) {
      c.save(); c.beginPath();
      c.arc(p.x + Math.cos(da) * r2, p.y + Math.sin(da) * r2, 5, 0, Math.PI * 2);
      c.fillStyle = pod.color; c.fill(); c.restore();
    });

    c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
    var ws = pod.name.split(' '), fs = ws.length > 2 ? 14 : 16, lh = fs + 5;
    ws.forEach(function(w, wi) {
      c.font = '600 ' + fs + 'px Outfit,sans-serif';
      c.fillStyle = pod.color;
      c.fillText(w, p.x, p.y - (ws.length - 1) * lh / 2 + wi * lh);
    });
    c.font = '400 12px DM Mono,monospace';
    c.fillStyle = pod.color + '99';
    c.fillText(pod.number, p.x, p.y + ws.length * lh / 2 + 6);
    c.restore();
  });

  // arrowheads on top
  pts.forEach(function(p, i) {
    var pod = PODS[i], a = p.ba;
    var x1 = p.x + Math.cos(a) * (rp + 3),  y1 = p.y + Math.sin(a) * (rp + 3);
    var x2 = p.x + Math.cos(a) * (rp + 66), y2 = p.y + Math.sin(a) * (rp + 66);
    var dx = x2 - x1, dy = y2 - y1, L = Math.sqrt(dx * dx + dy * dy);
    var ux = dx / L, uy = dy / L;
    c.save(); c.beginPath(); c.moveTo(x2, y2);
    c.lineTo(x2 - ux * 8 - uy * 4, y2 - uy * 8 + ux * 4);
    c.lineTo(x2 - ux * 8 + uy * 4, y2 - uy * 8 - ux * 4);
    c.closePath(); c.fillStyle = pod.color; c.fill(); c.restore();
  });

  // center
  c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
  c.font = 'italic 600 22px DM Serif Display,serif';
  c.fillStyle = 'rgba(14,14,18,.50)'; c.fillText('AIRpods', cx, cy - 12);
  c.font = '500 13px DM Mono,monospace';
  c.fillStyle = 'rgba(14,14,18,.33)'; c.fillText('AI READINESS PODS', cx, cy + 14);
  c.restore();
}

// Drag state
var dragIdx = -1, dragOffX = 0, dragOffY = 0, isDragging = false;

function hitPod(mx, my) {
  var rp = R * 0.22, f = -1;
  pos.forEach(function(p, i) {
    var dx = mx - p.x, dy = my - p.y;
    if (Math.sqrt(dx * dx + dy * dy) < rp + 10) f = i;
  });
  return f;
}

function showTooltip(f, ex, ey) {
  var tt = document.getElementById('tt');
  if (f >= 0) {
    var pod = PODS[f];
    document.getElementById('tt-num').textContent   = pod.number;
    document.getElementById('tt-name').textContent  = pod.name;
    document.getElementById('tt-name').style.color  = pod.color;
    document.getElementById('tt-exp').textContent   = pod.expertise;
    document.getElementById('tt-iface').textContent = pod.interfaces;
    document.getElementById('tt-net').textContent   = pod.network;
    document.getElementById('tt-dlbl').style.color  = pod.color;
    document.getElementById('tt-dval').textContent  = pod.deliverable;
    document.getElementById('tt-dval').style.color  = pod.color;
    tt.style.borderTopColor = pod.color;
    tt.classList.add('on');
    var caRect = ca.getBoundingClientRect();
    var tipX = ex - caRect.left + 20;
    var tipY = ey - caRect.top - 20;
    tt.style.left = (tipX + 310 > W ? tipX - 320 : tipX) + 'px';
    tt.style.top  = Math.max(4, Math.min(H - 280, tipY)) + 'px';
  } else {
    tt.classList.remove('on');
  }
}

function hideTooltip() {
  document.getElementById('tt').classList.remove('on');
}

// Compute angle from pod center to canvas center (for deliverable arrow)
function updateAngle(i) {
  var dx = pos[i].x - CX, dy = pos[i].y - CY;
  pos[i].ba = Math.atan2(dy, dx);
}

nc.addEventListener('mousedown', function(e) {
  var rect = nc.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  var f = hitPod(mx, my);
  if (f >= 0) {
    dragIdx = f;
    dragOffX = mx - pos[f].x;
    dragOffY = my - pos[f].y;
    isDragging = false;
    hideTooltip();
    nc.style.cursor = 'grabbing';
    e.preventDefault();
  }
});

nc.addEventListener('mousemove', function(e) {
  var rect = nc.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;

  if (dragIdx >= 0) {
    isDragging = true;
    pos[dragIdx].x = mx - dragOffX;
    pos[dragIdx].y = my - dragOffY;
    updateAngle(dragIdx);
    hov = dragIdx;
    draw(ctx, W, H, CX, CY, R, pos, false);
    return;
  }

  var f = hitPod(mx, my);
  var prev = hov; hov = f;
  if (hov !== prev) draw(ctx, W, H, CX, CY, R, pos, false);
  nc.style.cursor = f >= 0 ? 'grab' : 'default';
  showTooltip(f, e.clientX, e.clientY);
});

nc.addEventListener('mouseup', function(e) {
  if (dragIdx >= 0 && !isDragging) {
    // treat as click — show tooltip
    showTooltip(dragIdx, e.clientX, e.clientY);
  }
  dragIdx = -1; isDragging = false;
  nc.style.cursor = 'default';
});

nc.addEventListener('mouseleave', function() {
  if (dragIdx < 0) {
    hov = -1;
    draw(ctx, W, H, CX, CY, R, pos, false);
    hideTooltip();
  }
  nc.style.cursor = 'default';
});

// Touch support
nc.addEventListener('touchstart', function(e) {
  var rect = nc.getBoundingClientRect();
  var t = e.touches[0];
  var mx = t.clientX - rect.left, my = t.clientY - rect.top;
  var f = hitPod(mx, my);
  if (f >= 0) {
    dragIdx = f; dragOffX = mx - pos[f].x; dragOffY = my - pos[f].y;
    isDragging = false; hideTooltip();
    e.preventDefault();
  }
}, { passive: false });

nc.addEventListener('touchmove', function(e) {
  if (dragIdx < 0) return;
  var rect = nc.getBoundingClientRect();
  var t = e.touches[0];
  var mx = t.clientX - rect.left, my = t.clientY - rect.top;
  isDragging = true;
  pos[dragIdx].x = mx - dragOffX; pos[dragIdx].y = my - dragOffY;
  updateAngle(dragIdx);
  hov = dragIdx;
  draw(ctx, W, H, CX, CY, R, pos, false);
  e.preventDefault();
}, { passive: false });

nc.addEventListener('touchend', function(e) {
  dragIdx = -1; isDragging = false;
});

// Export
function exportNet() {
  var dpr = 2, legH = 60;
  var ec = document.getElementById('ec');
  ec.width = W * dpr; ec.height = (H + legH) * dpr;
  var ec2 = ec.getContext('2d'); ec2.scale(dpr, dpr);
  ec2.fillStyle = '#fff'; ec2.fillRect(0, 0, W, H + legH);
  var sp = PODS.map(function(_, i) {
    var a = (i / 7) * Math.PI * 2 - Math.PI / 2;
    return { x: CX + R * Math.cos(a), y: CY + R * Math.sin(a), ba: a };
  });
  draw(ec2, W, H, CX, CY, R, sp, true);
  var ly = H + 8;
  ec2.fillStyle = '#f5f4f0'; rrect(ec2, 16, ly, W - 32, legH - 16, 8); ec2.fill();
  ec2.strokeStyle = 'rgba(14,14,18,.1)'; ec2.lineWidth = 1;
  rrect(ec2, 16, ly, W - 32, legH - 16, 8); ec2.stroke();
  var lmid = ly + (legH - 16) / 2, lx = 36;
  ec2.beginPath(); ec2.moveTo(lx, lmid); ec2.lineTo(lx + 32, lmid);
  ec2.strokeStyle = 'rgba(14,14,18,.35)'; ec2.lineWidth = 1.2; ec2.stroke();
  lx += 36; ec2.font = '500 12px Outfit,sans-serif'; ec2.fillStyle = 'rgba(14,14,18,.55)';
  ec2.fillText('Pod interfaces (fully connected)', lx, lmid + 4);
  lx += ec2.measureText('Pod interfaces (fully connected)').width + 28;
  ec2.save(); ec2.setLineDash([5, 4]);
  ec2.beginPath(); ec2.moveTo(lx, lmid); ec2.lineTo(lx + 32, lmid);
  ec2.strokeStyle = 'rgba(14,14,18,.45)'; ec2.lineWidth = 1.2; ec2.stroke();
  ec2.restore();
  lx += 36;
  ec2.fillText('Deliverables outward to public / stakeholders', lx, lmid + 4);
  var a = document.createElement('a');
  a.download = 'AIRpods-network.jpg';
  a.href = ec.toDataURL('image/jpeg', .96);
  a.click();
}

window.addEventListener('resize', function() { resize(); });
resize();
</script>
</body>
</html>
